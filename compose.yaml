services:

  registration:
    build: ./registration
    ports:
      - "5000:5000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - DATABASE_URL=${DATABASE_URL}
    restart: always

  event:
    build: ./event
    ports:
      - "5001:5001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: always

  volunteer:
    build: ./volunteer
    ports:
      - "5002:5002"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: always

  waitlist:
    build: ./waitlist
    ports:
      - "5003:5003"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: always

  organiser:
    build: ./organiser
    ports:
      - "5004:5004"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
    restart: always

  register_for_event:
    build: ./register_for_event
    ports:
      - "5010:5010"
    environment:
      - REGISTRATION_URL=http://registration:5000
      - EVENT_URL=http://event:5001
      - VOLUNTEER_URL=http://volunteer:5002
      - WAITLIST_URL=http://waitlist:5003
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - event
      - volunteer
      - registration
      - waitlist
      - rabbitmq
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI → localhost:15672
    restart: always